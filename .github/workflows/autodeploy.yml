name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          echo "### CI DIAGNOSTICS: node & npm versions and workspace listing"
          node -v || true
          npm -v || true
          echo "### listing frontend directory"
          ls -la || true
          if [ -z "$VITE_API_URL" ]; then
            echo "WARNING: VITE_API_URL is not set; build will use the default relative API path"
          else
            echo "Building frontend with VITE_API_URL=$VITE_API_URL"
          fi
          npm ci --no-audit --no-fund
          VITE_API_URL=$VITE_API_URL npm run build

      - name: Deploy frontend to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          echo "### Deploy diagnostics"
          echo "PWD: $(pwd)"
          echo "NETLIFY_SITE_ID=${NETLIFY_SITE_ID}"
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "ERROR: NETLIFY_AUTH_TOKEN is not set"
            exit 1
          fi
          if [ -z "$NETLIFY_SITE_ID" ]; then
            echo "ERROR: NETLIFY_SITE_ID is not set"
            exit 1
          fi
          echo "Listing frontend/dist contents"
          ls -la frontend/dist || true
          ls -la frontend/dist/assets || true
          npm install netlify-cli --no-audit --no-fund
          npx netlify-cli deploy --dir=frontend/dist --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN --prod

      - name: Trigger Render backend deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Render secrets not configured; skipping Render deploy";
            exit 0;
          fi
          echo "Triggering Render deploy for service $RENDER_SERVICE_ID"
          curl -s -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
